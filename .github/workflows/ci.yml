name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # =========================================================
  # JOB 1 — BACKEND TESTS
  # =========================================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: test_library_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: test-secret-key-not-for-production
      DEBUG: True
      DB_NAME: test_library_db
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: 5432
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      FRONTEND_URL: http://localhost:3000
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_EMAIL: admin@test.com
      DJANGO_SUPERUSER_PASSWORD: Admin123!

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate

      - name: Run tests
        working-directory: backend
        run: python manage.py test --verbosity=2

  # =========================================================
  # JOB 2 — FRONTEND BUILD CHECK
  # =========================================================
  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build React app
        working-directory: frontend
        env:
          REACT_APP_API_URL: https://your-backend.railway.app/api
          CI: false
        run: npm run build

  # =========================================================
  # JOB 3 — DOCKER BUILD (only on main push)
  # =========================================================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t library-backend ./backend

      - name: Build frontend image
        run: docker build -t library-frontend ./frontend

      - name: Confirm builds succeeded
        run: echo "Both Docker images built successfully"